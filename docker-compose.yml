version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smart-hiring-postgres
    environment:
      POSTGRES_DB: smart_hiring
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: smart-hiring-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
